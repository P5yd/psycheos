[build]
  publish = "."
  command = ""

[build.environment]
  NETLIFY_USE_YARN = "false"

[[plugins]]
  # No plugins

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Service-Worker-Allowed = "/"
